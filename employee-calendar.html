<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>הוספת משמרות ליומן</title>
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <main class="shell employee-export-shell">
    <section class="topbar">
      <div>
        <h1>הוספת משמרות ליומן</h1>
        <p class="intro">בחרו שם, בדקו את המשמרות שיוספו, ואז אשרו הוספה ליומן Google.</p>
      </div>
    </section>

    <section class="panel employee-export-panel">
      <div class="panel-header">
        <h2>Google Calendar</h2>
        <span class="badge" id="exportStatus">ממתין</span>
      </div>
      <div class="panel-body">
        <div class="employee-export-form">
          <div>
            <label for="employeeSelect">שם עובד</label>
            <select id="employeeSelect"></select>
          </div>
          <div>
            <label for="calendarEmail">אימייל Google Calendar</label>
            <input id="calendarEmail" type="email" dir="ltr" placeholder="name@gmail.com" autocomplete="email">
          </div>
        </div>

        <div class="preview-title">תצוגה מקדימה</div>
        <div id="eventPreview" class="employee-event-preview"></div>

        <div class="actions preview-actions">
          <button class="btn secondary" id="authorizeGoogle" type="button">התחבר עם Google</button>
          <span class="autosave-status" id="authStatus">לא מחובר</span>
        </div>
        <div class="actions preview-actions">
          <button class="btn" id="addToCalendar" type="button" disabled>הוסף ליומן Google</button>
        </div>
        <div class="helper">הכפתור הראשי מוסיף את המשמרות ישירות ליומן Google אחרי אישור הרשאה.</div>
        <div class="calendar-fallback-row">
          <button class="calendar-fallback-link" id="downloadCalendarFile" type="button">הורד קובץ יומן כגיבוי</button>
        </div>
        <div class="intake-status" id="calendarMessage"></div>
      </div>
    </section>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="src/googleConfig.js"></script>
  <script src="src/auth/googleOAuthService.js"></script>
  <script src="src/scheduleExport.js"></script>
  <script src="src/calendarService.js"></script>
  <script>
    const employeeSelectEl = document.getElementById("employeeSelect");
    const calendarEmailEl = document.getElementById("calendarEmail");
    const eventPreviewEl = document.getElementById("eventPreview");
    const authorizeGoogleEl = document.getElementById("authorizeGoogle");
    const authStatusEl = document.getElementById("authStatus");
    const addToCalendarEl = document.getElementById("addToCalendar");
    const downloadCalendarFileEl = document.getElementById("downloadCalendarFile");
    const calendarMessageEl = document.getElementById("calendarMessage");
    const exportStatusEl = document.getElementById("exportStatus");

    let finalizedSchedule = null;

    function displayDate(value) {
      const date = new Date(`${value}T12:00:00`);
      return `${date.getDate()}.${date.getMonth() + 1}.${date.getFullYear()}`;
    }

    function renderError(message) {
      exportStatusEl.textContent = "שגיאה";
      calendarMessageEl.textContent = message;
      eventPreviewEl.innerHTML = "";
      addToCalendarEl.disabled = true;
    }

    function renderEmployeeOptions() {
      employeeSelectEl.innerHTML = finalizedSchedule.employees
        .map(employee => `<option value="${employee.id}">${employee.name}</option>`)
        .join("");
    }

    function selectedEvents() {
      return calendarService.shiftsForEmployee(finalizedSchedule, employeeSelectEl.value);
    }

    function renderPreview() {
      const events = selectedEvents();
      if (!events.length) {
        eventPreviewEl.innerHTML = `<div class="employee-empty-state">No shifts found for this employee</div>`;
        exportStatusEl.textContent = "אין משמרות";
        addToCalendarEl.disabled = true;
        return;
      }

      exportStatusEl.textContent = `${events.length} משמרות`;
      addToCalendarEl.disabled = !googleOAuthService.isAuthorized();
      eventPreviewEl.innerHTML = events.map(event => `
        <div class="employee-event-row">
          <div>
            <strong>${event.title}</strong>
            <span>${displayDate(event.date)} · ${event.dayName}</span>
          </div>
          <div dir="ltr">${event.startTime}–${event.endTime}</div>
        </div>
      `).join("");
    }

    async function handleAuthorizeGoogle() {
      calendarMessageEl.textContent = "";
      authStatusEl.textContent = "מתחבר...";
      try {
        await googleOAuthService.signIn();
        authStatusEl.textContent = "מחובר ל-Google";
        calendarMessageEl.textContent = "ההרשאה התקבלה. בדקו את התצוגה המקדימה ואשרו הוספה ליומן.";
        renderPreview();
      } catch (error) {
        authStatusEl.textContent = "לא מחובר";
        addToCalendarEl.disabled = true;
        calendarMessageEl.textContent = error.message || "Authorization failed. Please retry.";
      }
    }

    async function handleAddToGoogleCalendar() {
      const email = calendarEmailEl.value.trim();
      if (!calendarService.isValidEmail(email)) {
        calendarMessageEl.textContent = "Invalid email address";
        return;
      }
      if (!googleOAuthService.isAuthorized()) {
        calendarMessageEl.textContent = "יש להתחבר עם Google לפני ההוספה ליומן.";
        return;
      }

      addToCalendarEl.disabled = true;
      authorizeGoogleEl.disabled = true;
      addToCalendarEl.textContent = "מוסיף ליומן...";
      try {
        const result = await calendarService.createGoogleCalendarEvents({
          schedule: finalizedSchedule,
          employeeId: employeeSelectEl.value,
          calendarEmail: email,
          accessToken: googleOAuthService.getAccessToken()
        });
        calendarMessageEl.textContent = result.existingCount >= result.events.length
          ? "המשמרות כבר נוספו ליומן."
          : "המשמרות נוספו ליומן Google בהצלחה.";
      } catch (error) {
        calendarMessageEl.textContent = error.message || "Google Calendar authorization failed. Please retry.";
      } finally {
        addToCalendarEl.textContent = "הוסף ליומן Google";
        authorizeGoogleEl.disabled = false;
        renderPreview();
      }
    }

    async function handleDownloadCalendarFile() {
      const email = calendarEmailEl.value.trim();
      if (!calendarService.isValidEmail(email)) {
        calendarMessageEl.textContent = "Invalid email address";
        return;
      }
      try {
        await calendarService.exportCalendarFile({
          schedule: finalizedSchedule,
          employeeId: employeeSelectEl.value,
          calendarEmail: email
        });
        calendarMessageEl.textContent = "קובץ היומן נוצר בהצלחה. פתחו אותו כדי להוסיף את המשמרות ליומן.";
      } catch (error) {
        calendarMessageEl.textContent = error.message || "יצירת קובץ היומן נכשלה. אפשר לנסות שוב.";
      }
    }

    try {
      finalizedSchedule = scheduleExport.readPayloadFromHash();
      if (!finalizedSchedule?.scheduleId || !Array.isArray(finalizedSchedule.employees) || !Array.isArray(finalizedSchedule.entries)) {
        throw new Error("Invalid finalized schedule link");
      }
      renderEmployeeOptions();
      renderPreview();
      employeeSelectEl.addEventListener("change", renderPreview);
      authorizeGoogleEl.addEventListener("click", handleAuthorizeGoogle);
      addToCalendarEl.addEventListener("click", handleAddToGoogleCalendar);
      downloadCalendarFileEl.addEventListener("click", handleDownloadCalendarFile);
      if (!googleOAuthService.hasConfiguredClient()) {
        authStatusEl.textContent = "Google OAuth לא מוגדר";
        authorizeGoogleEl.disabled = true;
        addToCalendarEl.disabled = true;
        calendarMessageEl.textContent = "הגדרת מנהל נדרשת: יש להגדיר Google OAuth Client ID בקובץ src/googleConfig.js לפני הוספה ישירה ליומן.";
      }
    } catch (error) {
      renderError(error.message || "Invalid finalized schedule link");
    }
  </script>
</body>
</html>
